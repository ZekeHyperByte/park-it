name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    # shared.config reads DB_*/REDIS_* (not DATABASE_URL); must match the
    # postgres service creds below or alembic/tests fail to authenticate.
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: parking
      DB_PASSWORD: parking
      DB_NAME: parking_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      JWT_SECRET: test-secret-key-for-ci-only-32bytes-long
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: parking
          POSTGRES_PASSWORD: parking
          POSTGRES_DB: parking_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        # Tests build their schema via Base.metadata.create_all (conftest), not
        # Alembic — migrations are smoke-tested separately in the migrations job.
        run: pytest -x -q --tb=short

      - name: Check circular imports
        run: |
          python -c "from api.app.main import app; print('OK')"

      - name: Check route count
        run: |
          python -c "from api.app.main import app; routes=[r for r in app.routes if hasattr(r,'path')]; print('Routes:', len(routes))"

  migrations:
    runs-on: ubuntu-latest
    # Smoke-test that Alembic migrations apply cleanly to an empty DB. Kept
    # separate from backend-tests because that job manages its own schema via
    # create_all/drop_all, which collides with Alembic's named constraints.
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: parking
      DB_PASSWORD: parking
      DB_NAME: parking_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: parking
          POSTGRES_PASSWORD: parking
          POSTGRES_DB: parking_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Alembic upgrade head
        run: alembic upgrade head

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (vitest)
        run: npm test

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: parking
          POSTGRES_PASSWORD: parking
          POSTGRES_DB: parking_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://parking:parking@localhost:5432/parking_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://parking:parking@localhost:5432/parking_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci-only-32bytes-long
        run: |
          pytest -x -q --tb=short

      - name: Check circular imports
        run: |
          python -c "from api.app.main import app; print('OK')"

      - name: Check route count
        run: |
          python -c "from api.app.main import app; routes=[r for r in app.routes if hasattr(r,'path')]; print('Routes:', len(routes))"

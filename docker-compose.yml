version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: parking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-parking}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-parking_secret}
      POSTGRES_DB: ${DB_NAME:-parking}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - parking-network

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: parking-pgbouncer
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DATABASE: ${DB_NAME:-parking}
      DATABASES_USER: ${DB_USER:-parking}
      DATABASES_PASSWORD: ${DB_PASSWORD:-parking_secret}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      ADMIN_USERS: parking
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parking-network

  redis:
    image: redis:7-alpine
    container_name: parking-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - parking-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: parking-api
    restart: unless-stopped
    environment:
      - APP_ENV=development
      - DEBUG=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=parking
      - DB_USER=parking
      - DB_PASSWORD=parking_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    volumes:
      - .:/app:cached
    networks:
      - parking-network
    command: >
      uvicorn api.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info

volumes:
  postgres_data:
  redis_data:

networks:
  parking-network:
    driver: bridge
